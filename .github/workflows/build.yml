name: Build and release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Freeze backend to ytdlp-backend.exe
        run: pyinstaller --onefile --name ytdlp-backend --distpath dist backend_ipc.py

      - name: Download bundled ffmpeg
        shell: bash
        run: |
          mkdir -p vendor/ffmpeg
          curl -sL -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          unzip -q ffmpeg.zip -d ffmpeg-extract
          DIR=$(find ffmpeg-extract -mindepth 1 -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
          echo "Extracted to: $DIR"
          if [ -z "$DIR" ]; then
            echo "No ffmpeg-* directory found in ffmpeg-extract:" && ls -la ffmpeg-extract
            exit 1
          fi
          cp "$DIR/bin/ffmpeg.exe" vendor/ffmpeg/ffmpeg.exe
          cp "$DIR/bin/ffprobe.exe" vendor/ffmpeg/ffprobe.exe
          rm -rf ffmpeg.zip ffmpeg-extract

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Windows installer + portable exe
        working-directory: electron
        run: npx electron-builder --win

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
